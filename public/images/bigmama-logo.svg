  <circle cx="25" cy="77"  r="3" fill="#333"/>
  <circle cx="13" cy="50"  r="3" fill="#333"/>
  <circle cx="25" cy="23"  r="3" fill="#333"/>

  <!-- Red location pin -->
  <path d="M50 21 C39 21 30 30 30 41 C30 54 50 68 50 68 C50 68 70 54 70 41 C70 30 61 21 50 21 Z" fill="#e53935"/>
