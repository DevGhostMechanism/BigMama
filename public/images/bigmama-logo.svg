<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="80" height="80">
  <!-- White fill + blue circle border -->
  <circle cx="50" cy="50" r="46" fill="white" stroke="#2563eb" stroke-width="4"/>

  <!-- Spoke lines from center to nodes -->
  <line x1="50" y1="50" x2="50" y2="13"  stroke="#444" stroke-width="1.2"/>
  <line x1="50" y1="50" x2="75" y2="23"  stroke="#444" stroke-width="1.2"/>
  <line x1="50" y1="50" x2="87" y2="50"  stroke="#444" stroke-width="1.2"/>
  <line x1="50" y1="50" x2="75" y2="77"  stroke="#444" stroke-width="1.2"/>
  <line x1="50" y1="50" x2="50" y2="87"  stroke="#444" stroke-width="1.2"/>
  <line x1="50" y1="50" x2="25" y2="77"  stroke="#444" stroke-width="1.2"/>
  <line x1="50" y1="50" x2="13" y2="50"  stroke="#444" stroke-width="1.2"/>
  <line x1="50" y1="50" x2="25" y2="23"  stroke="#444" stroke-width="1.2"/>

  <!-- Outer nodes -->
  <circle cx="50" cy="13"  r="3" fill="#333"/>
  <circle cx="75" cy="23"  r="3" fill="#333"/>
  <circle cx="87" cy="50"  r="3" fill="#333"/>
